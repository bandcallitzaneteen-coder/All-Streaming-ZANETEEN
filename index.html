<title>Band Smart Link</title>
<style>
  /* ========================================
     สี/ฟอนต์หลักของธีม (แก้สีรวมได้ที่นี่)
     ======================================== */
  :root{
    --bg-color: #161311;        /* สีพื้นหลังหน้าเว็บ (โทนเข้มอบอุ่น) */
    --card-color: #211c19;      /* สีกล่องด้านใน (ถ้ามี) */
    --text-color: #f5ece3;      /* สีตัวอักษรหลัก */
    --subtext-color: #b8a89a;   /* สีตัวอักษรรอง */
    --accent-color: #d99a5b;    /* สีเน้น (เส้นขอบ/hover) โทนทอง-อบอุ่น */
    --btn-bg: #2a2420;          /* สีพื้นปุ่ม */
    --btn-hover: #3a322c;       /* สีปุ่มตอน hover */
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  body{
    background: var(--bg-color);
    color: var(--text-color);
    font-family: 'Helvetica Neue', Arial, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 24px 16px;
  }

  .container{
    width:100%;
    max-width: 420px;
    text-align:center;
  }

  /* ================================
     รูปโปรไฟล์วง
     ================================ */
  .profile-img{
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--accent-color);
    margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(217,154,91,0.15);
  }

  /* ================================
     ชื่อวง / คำอธิบายสั้นๆ
     ================================ */
  .band-name{
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .band-subtitle{
    font-size: 14px;
    color: var(--subtext-color);
    margin-bottom: 32px;
    letter-spacing: 0.5px;
  }

  /* ================================
     ปุ่มลิงก์สตรีมมิ่ง
     ================================ */
  .links{
    display:flex;
    flex-direction: column;
    gap: 14px;
  }

  .link-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 10px;
    background: var(--btn-bg);
    color: var(--text-color);
    border: 1px solid rgba(245,236,227,0.08);
    border-radius: 14px;
    padding: 16px 20px;
    text-decoration:none;
    font-size: 16px;
    font-weight: 500;
    transition: all 0.25s ease;
  }

  .link-btn:hover{
    background: var(--btn-hover);
    border-color: var(--accent-color);
    transform: translateY(-2px);
  }

  .link-btn .icon{
    font-size: 18px;
  }

  footer{
    margin-top: 36px;
    font-size: 12px;
    color: var(--subtext-color);
    opacity: 0.6;
  }

  /* Responsive เล็กน้อยสำหรับจอเล็กมาก */
  @media (max-width: 360px){
    .profile-img{ width:120px; height:120px; }
    .band-name{ font-size: 24px; }
  }
</style>
</head>

    cursor: pointer;
    opacity: 0.08;
    z-index: 9999;
    transition: opacity 0.2s;
  }
  #secretEditBtn:hover{ opacity: 0.4; }

  .edit-toolbar{
    position: fixed;
    top:0; left:0; right:0;
    background:#1c1714;
    border-bottom: 2px solid var(--accent-color);
    color:#fff;
    padding: 10px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap: wrap;
    gap:8px;
    z-index: 10000;
    font-size: 13px;
  }
  .edit-toolbar-label{ font-weight:600; }
  .toolbar-btn{
    background: var(--accent-color);
    color:#1c1714;
    border:none;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor:pointer;
    font-weight:600;
  }
  .toolbar-btn:hover{ opacity:0.85; }
  .save-btn{ background:#4caf7d; color:#fff; }

  body.edit-mode .editable{
    outline: 1.5px dashed var(--accent-color);
    cursor: pointer;
    border-radius: 6px;
  }
  body.edit-mode .editable:hover{
    outline: 2px solid var(--accent-color);
    background: rgba(217,154,91,0.08);
  }
  body.edit-mode{ padding-top: 50px; }

  .modal-overlay{
    position: fixed; inset:0;
    background: rgba(0,0,0,0.6);
    display:flex; align-items:center; justify-content:center;
    z-index: 10001;
    padding: 16px;
  }
  .modal-box{
    background:#211c19;
    border:1px solid var(--accent-color);
    border-radius: 14px;
    padding: 22px;
    width: 100%;
    max-width: 380px;
    color: var(--text-color);
  }
  .modal-box h3{ margin-bottom: 14px; font-size: 16px; }
  .modal-box label{
    display:block;
    font-size: 12px;
    color: var(--subtext-color);
    margin: 10px 0 4px;
  }
  .modal-box input{
    width:100%;
    padding: 9px 10px;
    border-radius: 8px;
    border:1px solid rgba(245,236,227,0.2);
    background:#161311;
    color:#fff;
    font-size:14px;
  }
  .modal-actions{
    display:flex;
    justify-content:flex-end;
    gap: 10px;
    margin-top: 18px;
  }
</style>

<script>
/* =====================================================
   ระบบ Live Editor (โหมดแก้ไข)
   วิธีเปิดโหมดแก้ไข: คลิกปุ่มจางๆมุมขวาล่าง หรือกด Ctrl+Shift+E
   ===================================================== */
(function(){
  const body = document.body;
  const toolbar = document.getElementById('editToolbar');
  const secretBtn = document.getElementById('secretEditBtn');
  const exitBtn = document.getElementById('exitEditBtn');
  const saveBtn = document.getElementById('saveBtn');
  const overlay = document.getElementById('editModalOverlay');
  const modalFields = document.getElementById('modalFields');
  const modalTitle = document.getElementById('modalTitle');
  const modalCancel = document.getElementById('modalCancel');
  const modalConfirm = document.getElementById('modalConfirm');

  let currentTarget = null;

  function enterEditMode(){
    body.classList.add('edit-mode');
    toolbar.style.display = 'flex';
    markEditableElements();
  }
  function exitEditMode(){
    body.classList.remove('edit-mode');
    toolbar.style.display = 'none';
  }

  function markEditableElements(){
    document.querySelectorAll('.band-name, .band-subtitle, .profile-img, .link-btn')
      .forEach(el => el.classList.add('editable'));
  }

  secretBtn.addEventListener('click', () => {
    if(body.classList.contains('edit-mode')) exitEditMode();
    else enterEditMode();
  });

  document.addEventListener('keydown', (e) => {
    if(e.ctrlKey && e.shiftKey && (e.key === 'E' || e.key === 'e')){
      e.preventDefault();
      if(body.classList.contains('edit-mode')) exitEditMode();
      else enterEditMode();
    }
  });

  exitBtn.addEventListener('click', exitEditMode);

  document.addEventListener('click', function(e){
    if(!body.classList.contains('edit-mode')) return;
    const el = e.target.closest('.editable');
    if(!el) return;
    e.preventDefault();
    openEditModal(el);
  });

  function openEditModal(el){
    currentTarget = el;
    modalFields.innerHTML = '';

    if(el.classList.contains('profile-img')){
      modalTitle.textContent = 'แก้ไขรูปโปรไฟล์วง';
      modalFields.innerHTML = `
        <label>เลือกไฟล์รูปภาพจากเครื่อง (รองรับทุกประเภท .jpg .png .gif .webp ฯลฯ)</label>
        <input type="file" id="field_imgfile" accept="image/*">
        <p style="font-size:12px;color:var(--subtext-color);margin-top:10px;">ตัวอย่างรูปปัจจุบัน:</p>
        <img id="field_imgpreview" src="${el.getAttribute('src')}" style="width:100%;max-height:160px;object-fit:contain;margin-top:6px;border-radius:8px;">
      `;
      // เมื่อเลือกไฟล์ ให้แปลงเป็น base64 แล้วโชว์ตัวอย่างทันที
      const fileInput = document.getElementById('field_imgfile');
      const preview = document.getElementById('field_imgpreview');
      fileInput.addEventListener('change', function(){
        const file = this.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(ev){
          preview.src = ev.target.result; // เก็บค่า base64 ไว้ใน preview เพื่อใช้ตอนกดตกลง
        };
        reader.readAsDataURL(file);
      });
    } else if(el.classList.contains('link-btn')){
      modalTitle.textContent = 'แก้ไขปุ่มลิงก์';
      let label = el.textContent.trim();
      modalFields.innerHTML = `
        <label>ข้อความบนปุ่ม</label>
        <input type="text" id="field_text" value="${label}">
        <label>ลิงก์ URL</label>
        <input type="text" id="field_href" value="${el.getAttribute('href')}">
      `;
    } else {
      modalTitle.textContent = 'แก้ไขข้อความ';
      modalFields.innerHTML = `
        <label>ข้อความ</label>
        <input type="text" id="field_text" value="${el.textContent.trim()}">
      `;
    }
    overlay.style.display = 'flex';
  }

  modalCancel.addEventListener('click', () => { overlay.style.display = 'none'; });

  modalConfirm.addEventListener('click', () => {
    if(!currentTarget) return;

    if(currentTarget.classList.contains('profile-img')){
      const preview = document.getElementById('field_imgpreview');
      currentTarget.setAttribute('src', preview.src); // ใช้ค่า base64 จากตัวอย่างรูปที่เลือกไว้
    } else if(currentTarget.classList.contains('link-btn')){
      const newText = document.getElementById('field_text').value;
      const newHref = document.getElementById('field_href').value;
      const iconEl = currentTarget.querySelector('.icon');
      currentTarget.innerHTML = '';
      if(iconEl) currentTarget.appendChild(iconEl);
      currentTarget.append(' ' + newText);
      currentTarget.setAttribute('href', newHref);
    } else {
      const newText = document.getElementById('field_text').value;
      currentTarget.textContent = newText;
    }

    overlay.style.display = 'none';
    currentTarget = null;
  });

  overlay.addEventListener('click', (e) => {
    if(e.target === overlay) overlay.style.display = 'none';
  });

  saveBtn.addEventListener('click', function(){
    const docClone = document.documentElement.cloneNode(true);

    docClone.querySelector('body').classList.remove('edit-mode');
    const clonedToolbar = docClone.querySelector('#editToolbar');
    if(clonedToolbar) clonedToolbar.style.display = 'none';
    const clonedOverlay = docClone.querySelector('#editModalOverlay');
    if(clonedOverlay) clonedOverlay.style.display = 'none';
    docClone.querySelectorAll('.editable').forEach(el => el.classList.remove('editable'));

    const htmlString = '<!DOCTYPE html>\n' + docClone.outerHTML;
    const blob = new Blob([htmlString], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'index.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    alert('บันทึกไฟล์ index.html เรียบร้อยแล้ว! นำไฟล์ที่ดาวน์โหลดไปอัปโหลดทับไฟล์เดิมได้เลย');
  });
})();
</script>



</body></html>
